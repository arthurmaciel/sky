name = "skyshop"
version = "0.1.0"
entry = "src/Main.sky"

[source]
root = "src"

[live]
port = 8000
store = "sqlite"
storePath = "skyshop_sessions.db"
# Serve static assets (favicon, app icons) from ./static under /static/*.
static = "static"

[dependencies]
"github.com/anzellai/sky-tailwind" = "latest"

["go.dependencies"]
"cloud.google.com/go/firestore" = "latest"
"firebase.google.com/go/v4" = "latest"
"firebase.google.com/go/v4/auth" = "latest"
"google.golang.org/api/iterator" = "latest"
"google.golang.org/api/option" = "latest"
"encoding/base64" = "latest"
"encoding/json" = "latest"
"github.com/google/uuid" = "latest"
"net/http" = "latest"
io = "latest"
strings = "latest"
strconv = "latest"
os = "latest"
fmt = "latest"
context = "latest"
"github.com/stripe/stripe-go/v84" = "latest"
"github.com/stripe/stripe-go/v84/checkout/session" = "latest"
"github.com/stripe/stripe-go/v84/customer" = "latest"
