<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
    <!-- Skyshop generic favicon: shopping bag with horizon stripe. -->
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#1d4ed8"/>
            <stop offset="1" stop-color="#0f172a"/>
        </linearGradient>
    </defs>
    <!-- Background rounded square -->
    <rect x="0" y="0" width="64" height="64" rx="12" fill="url(#bg)"/>
    <!-- Sky horizon stripe -->
    <rect x="0" y="40" width="64" height="2" fill="#fb923c" opacity="0.7"/>
    <!-- Shopping bag handles -->
    <path d="M22 26 Q22 16 32 16 Q42 16 42 26"
              stroke="#fde68a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Shopping bag body -->
    <path d="M16 26 L48 26 L46 52 Q46 54 44 54 L20 54 Q18 54 18 52 Z"
              fill="#fb923c"/>
    <!-- Bag highlight -->
    <path d="M18 28 L22 28 L22 30 Q22 32 20 32 L18 32 Z" fill="#fdba74" opacity="0.6"/>
</svg>
