name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: sky-linux-x64
          - os: macos-latest
            artifact: sky-darwin-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.4.8'
          cabal-version: '3.10.3.0'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Cache cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            ~/.cabal/packages
            dist-newstyle
          key: ${{ runner.os }}-cabal-${{ hashFiles('sky-compiler.cabal') }}
          restore-keys: |
            ${{ runner.os }}-cabal-

      # Cache example FFI bindings — `sky-ffi-inspect` on Stripe +
      # Firebase takes 15+ min cold. Restoring `.skycache/ffi/` (typed
      # .skyi + kernel JSON) and `.skydeps/` (Sky package lockfile)
      # between CI runs drops the sweep from ~25 min to ~3 min when
      # the upstream Go modules haven't moved.
      #
      # Cache key components:
      #   1. `runner.os` — same-platform builds share artefacts
      #   2. hash of `runtime-go/rt/**.go` — when the runtime API
      #      surface changes, Sky deps (sky-tailwind, etc.) may use
      #      removed identifiers and fail to compile. Dropping the
      #      cache forces a fresh `sky install` that re-fetches the
      #      latest upstream commit. Caught: v0.13 migration removed
      #      `Std.Css.right_` → `right`; pre-v0.13 cached
      #      `.skydeps/sky-tailwind` would fail E1001 on a v0.13 run.
      #   3. hash of `sky-stdlib/**.sky` — same reason for the
      #      Sky-side stdlib (kernel sigs, public surface).
      #   4. hash of every `sky.toml` — dep-version bumps invalidate
      #      the relevant slice.
      # Restore-keys include components 1–3 so only same-runtime
      # caches are eligible (cross-runtime restores would re-introduce
      # the staleness bug).
      - name: Cache example FFI bindings
        uses: actions/cache@v4
        with:
          path: |
            examples/*/.skycache/ffi
            examples/*/.skydeps
          key: ${{ runner.os }}-ffi-${{ hashFiles('runtime-go/rt/**.go', 'sky-stdlib/**.sky') }}-${{ hashFiles('examples/*/sky.toml') }}
          restore-keys: |
            ${{ runner.os }}-ffi-${{ hashFiles('runtime-go/rt/**.go', 'sky-stdlib/**.sky') }}-

      # Single-command local/CI parity: scripts/build.sh does everything
      # the manual steps below used to — compile sky, build sky-ffi-inspect,
      # install to sky-out/ + bin/. Adds self-test + example sweep when flagged.
      - name: Build compiler + tooling
        run: |
          ./scripts/build.sh --self-tests
          echo "$PWD/sky-out" >> $GITHUB_PATH
          echo "$PWD/bin"      >> $GITHUB_PATH

      - name: Smoke-test sky binary
        run: sky --version

      - name: Run cabal test suite
        # Skip Sky.Build.VerifyAll: that spec wraps `sky verify`
        # which we ALSO run as a dedicated step below. Doubling
        # up has no value AND VerifyAll has been observed to hang
        # in some CI envs (no per-example timeout in the spec
        # harness; the dedicated `sky verify` step has timeouts
        # via scripts/example-sweep.sh). Same skip we use locally
        # via `--test-options='--skip=Sky.Build.VerifyAll'`.
        run: cabal test --test-show-details=direct --test-options='--skip=Sky.Build.VerifyAll'

      # Example sweep — clean-build every example, then either run
      # to completion (cli, with `timeout 10`) or probe HTTP 200
      # (server, with `curl --max-time 1`). See scripts/example-sweep.sh.
      #
      # We use the script (not `sky verify`) because `sky verify`'s
      # per-example dispatch has no wall-clock cap — a CLI example
      # blocking on stdin or a server probe taking the whole TCP
      # backoff would hang the CI step indefinitely. The script's
      # bounded primitives keep the worst case ~10 min for a 19-
      # example sweep on a cold runner.
      - name: Example sweep (build + run + HTTP probe, bounded)
        run: bash scripts/example-sweep.sh

      # E2E harness — behavioural contracts per example (CLI flow
      # dispatch, HTTP body assertions, DB-error-log checks) that
      # `sky verify` alone misses. Catches logic/CLI/DB regressions
      # where the smoke test passes but the app's domain behaviour
      # is broken. Each example with examples/<n>/e2e.json runs
      # against its contract; any mismatch fails CI.
      - name: Run end-to-end contract tests
        run: bash scripts/example-e2e.sh

      # ─────────────────────────────────────────────────────────
      # Tooling smoke tests
      # ─────────────────────────────────────────────────────────
      - name: Test sky fmt (idempotent)
        run: |
          cp test-files/simple-case.sky /tmp/fmt-test.sky
          sky fmt /tmp/fmt-test.sky
          cp /tmp/fmt-test.sky /tmp/fmt-test2.sky
          sky fmt /tmp/fmt-test2.sky
          diff /tmp/fmt-test.sky /tmp/fmt-test2.sky

      - name: Test sky check
        run: sky check test-files/simple-case.sky

      # ─────────────────────────────────────────────────────────
      # Artifact
      # ─────────────────────────────────────────────────────────
      - name: Package artifact
        run: |
          mkdir -p dist
          cp sky-out/sky dist/${{ matrix.artifact }}
          cp bin/sky-ffi-inspect dist/sky-ffi-inspect-${{ matrix.artifact }} || true
          tar czf dist/${{ matrix.artifact }}.tar.gz -C dist ${{ matrix.artifact }} $( [ -f dist/sky-ffi-inspect-${{ matrix.artifact }} ] && echo sky-ffi-inspect-${{ matrix.artifact }} )
          ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz
